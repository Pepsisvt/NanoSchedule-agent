<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ededed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/manifest.json">
<title>日程助手</title>
<style>
/* === 变量 === */
:root {
  --bg: #ededed;
  --header-bg: #ededed;
  --header-border: #d9d9d9;
  --text: #1a1a1a;
  --sub: #999;
  --bubble-self: #95ec69;
  --bubble-self-text: #000;
  --bubble-other: #fff;
  --bubble-other-text: #1a1a1a;
  --input-bg: #f7f7f7;
  --input-border: #e0e0e0;
  --footer-bg: #f7f7f7;
  --alert-bg: #fff3cd;
  --alert-text: #856404;
  --modal-bg: #fff;
  --modal-overlay: rgba(0,0,0,0.4);
  --chip-bg: #f0f0f0;
  --chip-on: #07c160;
  --input-field-bg: #fff;
}
.dark {
  --bg: #111;
  --header-bg: #1a1a1a;
  --header-border: #2a2a2a;
  --text: #e8e8e8;
  --sub: #777;
  --bubble-self: #0b5e2e;
  --bubble-self-text: #e8e8e8;
  --bubble-other: #262626;
  --bubble-other-text: #e8e8e8;
  --input-bg: #1a1a1a;
  --input-border: #333;
  --footer-bg: #1a1a1a;
  --alert-bg: #332b00;
  --alert-text: #ffc107;
  --modal-bg: #1a1a1a;
  --modal-overlay: rgba(0,0,0,0.7);
  --chip-bg: #2a2a2a;
  --input-field-bg: #111;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;transition:.3s}

/* === 头部 === */
header{
  background:var(--header-bg);padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--header-border);position:relative;z-index:10
}
header .back{font-size:20px;cursor:pointer;width:32px;text-align:center}
header .avatar{width:36px;height:36px;border-radius:6px;background:#07c160;display:flex;align-items:center;justify-content:center;font-size:18px}
header .info{flex:1}
header .info .name{font-size:16px;font-weight:600}
header .info .status{font-size:11px;color:var(--sub)}
header .mode-btn{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  font-size:18px;background:var(--chip-bg);display:flex;align-items:center;justify-content:center
}

/* === 聊天区 === */
#chat{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:8px;max-width:90%}
.msg-row.self{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.msg-avatar.user{background:#07c160}
.msg-avatar.bot{background:#1989fa}
.msg-content{display:flex;flex-direction:column;gap:2px}
.msg-bubble{
  padding:9px 12px;border-radius:6px;font-size:15px;line-height:1.5;
  word-break:break-word;position:relative
}
.msg-row.self .msg-bubble{
  background:var(--bubble-self);color:var(--bubble-self-text)
}
.msg-row.other .msg-bubble{
  background:var(--bubble-other);color:var(--bubble-other-text);
  border:1px solid var(--input-border)
}
.msg-bubble b{color:inherit;font-weight:700}
.msg-time{font-size:11px;color:var(--sub);padding:0 4px}
.msg-row.self .msg-time{text-align:right}

/* 工具气泡 */
.tool-msg{text-align:center;font-size:11px;color:var(--sub);padding:2px 0}

/* 通知条 */
#alertBar{display:none;background:var(--alert-bg);color:var(--alert-text);text-align:center;padding:8px;font-size:13px;font-weight:600}


/* === 底部输入 === */
footer{
  background:var(--footer-bg);padding:8px 10px;
  display:flex;gap:8px;align-items:center;border-top:1px solid var(--header-border)
}
footer .input-wrap{
  flex:1;display:flex;align-items:center;background:var(--input-bg);
  border-radius:6px;border:1px solid var(--input-border);padding:0 10px
}
footer input{
  flex:1;padding:10px 0;border:none;background:transparent;color:var(--text);
  font-size:15px;outline:none
}
footer button.send-btn{
  border:none;background:#07c160;color:#fff;padding:8px 16px;
  border-radius:6px;font-size:14px;cursor:pointer;font-weight:500
}
footer button.plus-btn{
  border:2px solid var(--input-border);background:transparent;color:var(--text);
  width:36px;height:36px;border-radius:6px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;font-weight:300
}
.menu-item{text-align:center;cursor:pointer;padding:8px 4px;border-radius:8px;transition:.2s}
.menu-item:hover{background:var(--chip-bg)}
.menu-icon{font-size:28px;margin-bottom:4px}
.menu-label{font-size:12px;color:var(--sub)}

/* === 弹窗 === */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--modal-overlay);z-index:200;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--modal-bg);width:100%;max-width:500px;border-radius:12px 12px 0 0;padding:20px;max-height:85vh;overflow-y:auto;color:var(--text)}
.modal h3{text-align:center;font-size:16px;margin-bottom:14px;font-weight:500}
.modal label{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
.modal input,.modal textarea{
  width:100%;padding:10px;border-radius:6px;border:1px solid var(--input-border);
  background:var(--input-field-bg);color:var(--text);font-size:15px;outline:none
}
.modal textarea{height:56px;resize:none}
.modal .row{display:flex;gap:6px}
.modal .row>*{flex:1}
.modal .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.modal .chip{
  background:var(--chip-bg);color:var(--text);border:1px solid var(--input-border);
  padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer
}
.modal .chip.on{background:#07c160;color:#fff;border-color:#07c160}
.modal .btns{display:flex;gap:10px;margin-top:18px}
.modal .btns button{flex:1;padding:11px;border-radius:6px;border:none;font-size:15px;cursor:pointer}
.modal .btn-cancel{background:var(--chip-bg);color:var(--text)}
.modal .btn-submit{background:#07c160;color:#fff;font-weight:600}

/* 过渡 */
.fade{transition:all .3s}
</style>
</head>
<body>

<header>
  <span class="back" onclick="location.reload()">←</span>
  <div class="avatar">📅</div>
  <div class="info">
    <div class="name">日程助手</div>
    <div class="status" id="statusText">在线</div>
  </div>
  <button class="mode-btn" onclick="toggleMode()" title="切换深色/浅色">🌓</button>
</header>

<div id="alertBar"></div>

<div id="chat">
  <div class="tool-msg">6月25日 星期四</div>
  <div class="msg-row other">
    <div class="msg-avatar bot">🤖</div>
    <div class="msg-content">
      <div class="msg-bubble">你好！我是日程助手<br>可以帮你管理日程、设置提醒<br>点击右下角 <b>+</b> 打开快捷菜单</div>
    </div>
  </div>
</div>

<!-- 快捷菜单面板 -->
<div id="menuPanel" style="display:none;background:var(--footer-bg);border-top:1px solid var(--header-border);padding:12px 14px">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    <div class="menu-item" onclick="send('查看我所有日程')">
      <div class="menu-icon">📋</div><div class="menu-label">全部日程</div>
    </div>
    <div class="menu-item" onclick="send('今天有什么安排')">
      <div class="menu-icon">📅</div><div class="menu-label">今日日程</div>
    </div>
    <div class="menu-item" onclick="openModal()">
      <div class="menu-icon">➕</div><div class="menu-label">创建日程</div>
    </div>
    <div class="menu-item" onclick="openRemindModal()">
      <div class="menu-icon">⏰</div><div class="menu-label">设置提醒</div>
    </div>
    <div class="menu-item" onclick="send('明天天气怎么样')">
      <div class="menu-icon">🌤️</div><div class="menu-label">查天气</div>
    </div>
    <div class="menu-item" onclick="openStats()">
      <div class="menu-icon">📊</div><div class="menu-label">日程统计</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <input id="input" type="text" placeholder="输入消息..." autofocus>
  </div>
  <button class="send-btn" onclick="send()">发送</button>
  <button class="plus-btn" id="plusBtn" onclick="toggleMenu()">＋</button>
</footer>

<!-- 创建日程弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <h3>📅 创建日程</h3>
  <label>标题 *</label><input id="evTitle" placeholder="如：团队周会">
  <label>日期</label>
  <div class="chip-row" id="dateChips">
    <span class="chip" data-date="today">今天</span>
    <span class="chip on" data-date="tomorrow">明天</span>
    <span class="chip" data-date="day2">后天</span>
  </div>
  <input id="evDate" type="date">
  <label>时间</label>
  <div class="chip-row" id="timeChips">
    <span class="chip" data-time="08:00">08:00</span><span class="chip" data-time="10:00">10:00</span>
    <span class="chip on" data-time="15:00">15:00</span><span class="chip" data-time="16:00">16:00</span>
    <span class="chip" data-time="19:00">19:00</span><span class="chip" data-time="20:00">20:00</span>
  </div>
  <input id="evTime" type="time" value="15:00">
  <label>时长</label>
  <div class="chip-row" id="durChips">
    <span class="chip" data-dur="30">30分</span><span class="chip on" data-dur="60">1小时</span>
    <span class="chip" data-dur="90">1.5时</span><span class="chip" data-dur="120">2小时</span>
  </div>
  <label>地点</label><input id="evLocation" placeholder="如：会议室A">
  <label>备注</label><textarea id="evDesc" placeholder="备注信息..."></textarea>
  <div class="btns">
    <button class="btn-cancel" onclick="closeModal()">取消</button>
    <button class="btn-submit" onclick="submitEvent()">创建</button>
  </div>
</div></div>

<!-- 设置提醒弹窗 -->
<div class="modal-overlay" id="remindOverlay" onclick="if(event.target===this)closeRemindModal()">
<div class="modal">
  <h3>⏰ 设置提醒</h3>
  <label>提醒内容 *</label><input id="remMsg" placeholder="如：该去开会了">
  <label>日期</label>
  <div class="chip-row" id="remDateChips">
    <span class="chip on" data-date="today">今天</span>
    <span class="chip" data-date="tomorrow">明天</span>
    <span class="chip" data-date="day2">后天</span>
  </div>
  <input id="remDate" type="date">
  <label>时间</label>
  <div class="chip-row" id="remTimeChips">
    <span class="chip" data-time="09:00">09:00</span><span class="chip" data-time="12:00">12:00</span>
    <span class="chip on" data-time="15:00">15:00</span><span class="chip" data-time="18:00">18:00</span>
    <span class="chip" data-time="20:00">20:00</span>
  </div>
  <input id="remTime" type="time" value="15:00">
  <div class="btns">
    <button class="btn-cancel" onclick="closeRemindModal()">取消</button>
    <button class="btn-submit" onclick="submitReminder()">设置提醒</button>
  </div>
</div></div>

<!-- 统计面板 -->
<div class="modal-overlay" id="statsOverlay" onclick="if(event.target===this)closeStats()">
<div class="modal">
  <h3>📊 日程统计（近7天）</h3>
  <div id="statsContent" style="text-align:center;padding:10px;color:var(--sub)">加载中...</div>
  <div class="btns"><button class="btn-cancel" onclick="closeStats()">关闭</button></div>
</div></div>

<script>
// === 主题切换 ===
function toggleMode(){
  document.documentElement.classList.toggle('dark');
  var isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('theme', isDark?'dark':'light');
  var meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.content = isDark?'#111':'#ededed';
}
// 加载保存的主题
if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark');

// === 弹窗 ===
var selDate='tomorrow',selDur=60;
function openModal(){
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('evTitle').focus();
  var d=new Date();d.setDate(d.getDate()+1);
  document.getElementById('evDate').value=d.toISOString().slice(0,10);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('dateChips').onclick=function(e){
  if(!e.target.classList.contains('chip'))return;
  this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  e.target.classList.add('on');selDate=e.target.dataset.date;
  var d=new Date();
  if(selDate==='today');else if(selDate==='tomorrow')d.setDate(d.getDate()+1);
  else d.setDate(d.getDate()+2);
  document.getElementById('evDate').value=d.toISOString().slice(0,10);
};
document.getElementById('timeChips').onclick=function(e){
  if(!e.target.classList.contains('chip'))return;
  this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  e.target.classList.add('on');
  document.getElementById('evTime').value=e.target.dataset.time;
};
document.getElementById('durChips').onclick=function(e){
  if(!e.target.classList.contains('chip'))return;
  this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  e.target.classList.add('on');selDur=parseInt(e.target.dataset.dur);
};
function submitEvent(){
  var title=document.getElementById('evTitle').value.trim();
  if(!title){alert('请输入标题');return}
  var date=document.getElementById('evDate').value;
  var time=document.getElementById('evTime').value;
  var loc=document.getElementById('evLocation').value.trim();
  var desc=document.getElementById('evDesc').value.trim();
  var msg='帮我创建日程：'+date+' '+time+' '+title;
  if(loc) msg+='，地点'+loc;
  if(desc) msg+='，备注'+desc;
  closeModal();
  ['evTitle','evLocation','evDesc'].forEach(function(id){document.getElementById(id).value=''});
  send(msg);
}

// === 提醒弹窗 ===
var remSelDate='today';
function openRemindModal(){
  document.getElementById('remindOverlay').classList.add('show');
  var d=new Date();
  document.getElementById('remDate').value=d.toISOString().slice(0,10);
  document.getElementById('remMsg').focus();
}
function closeRemindModal(){document.getElementById('remindOverlay').classList.remove('show')}
document.getElementById('remDateChips').onclick=function(e){
  if(!e.target.classList.contains('chip'))return;
  this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  e.target.classList.add('on');remSelDate=e.target.dataset.date;
  var d=new Date();
  if(remSelDate==='today');else if(remSelDate==='tomorrow')d.setDate(d.getDate()+1);
  else d.setDate(d.getDate()+2);
  document.getElementById('remDate').value=d.toISOString().slice(0,10);
};
document.getElementById('remTimeChips').onclick=function(e){
  if(!e.target.classList.contains('chip'))return;
  this.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  e.target.classList.add('on');
  document.getElementById('remTime').value=e.target.dataset.time;
};
function submitReminder(){
  var msg=document.getElementById('remMsg').value.trim();
  if(!msg){alert('请输入提醒内容');return}
  var date=document.getElementById('remDate').value;
  var time=document.getElementById('remTime').value;
  var dt=date+'T'+time+':00';
  closeRemindModal();
  document.getElementById('remMsg').value='';
  send('帮我设置提醒：'+dt+' '+msg);
}

// === 统计面板 ===
function openStats(){
  document.getElementById('statsOverlay').classList.add('show');
  document.getElementById('statsContent').innerHTML = '加载中...';
  fetch('/api/stats').then(function(r){return r.json()}).then(renderStats);
}
function closeStats(){document.getElementById('statsOverlay').classList.remove('show')}

function renderStats(data){
  if(data.error){ document.getElementById('statsContent').innerHTML='[ERROR] '+data.error; return; }
  var html = '';

  // 概览
  html += '<div style="font-size:24px;margin:8px 0">';
  html += '<b>'+data.total_events+'</b> 个日程 | 完成率 <b>'+data.completion_rate+'%</b>';
  html += '</div>';

  // 类别分布 —— 水平柱状图
  if(data.categories && data.categories.length>0){
    var max = data.categories[0].count;
    html += '<div style="text-align:left;margin:12px 0"><b>类别分布</b></div>';
    data.categories.forEach(function(c){
      var pct = Math.round(c.count/max*100);
      var barColor = '#3b82f6';
      html += '<div style="display:flex;align-items:center;margin:4px 0;font-size:13px">';
      html += '<span style="width:70px">'+c.name+'</span>';
      html += '<span style="flex:1;height:18px;background:var(--chip-bg);border-radius:9px;overflow:hidden">';
      html += '<span style="display:block;height:100%;width:'+pct+'%;background:'+barColor+';border-radius:9px"></span></span>';
      html += '<span style="width:30px;text-align:right;color:var(--sub)">'+c.count+'</span>';
      html += '</div>';
    });
  }

  // 时段分布
  if(data.time_slots){
    var slotMax = Math.max.apply(null, data.time_slots.map(function(s){return s.count}));
    if(slotMax > 0){
      html += '<div style="text-align:left;margin:12px 0"><b>时段分布</b></div>';
      html += '<div style="display:flex;gap:6px;align-items:flex-end;height:100px;padding:0 10px">';
      var colors = ['#f59e0b','#3b82f6','#8b5cf6','#475569'];
      data.time_slots.forEach(function(s,i){
        var h = Math.max(8, Math.round(s.count/slotMax*80));
        html += '<div style="flex:1;text-align:center;font-size:11px">';
        html += '<div>'+s.count+'</div>';
        html += '<div style="height:'+h+'px;background:'+colors[i]+';border-radius:4px 4px 0 0;margin:4px 0"></div>';
        html += '<div style="color:var(--sub)">'+s.name+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }
  }

  // 每日趋势
  if(data.daily && data.daily.length>0){
    html += '<div style="text-align:left;margin:12px 0"><b>每日完成趋势</b></div>';
    html += '<div style="display:flex;gap:4px;align-items:flex-end;height:60px;padding:0 5px">';
    data.daily.forEach(function(d){
      var h = Math.max(6, d.rate || 6);
      var c = d.rate >= 80 ? '#22c55e' : d.rate >= 50 ? '#f59e0b' : '#ef4444';
      html += '<div style="flex:1;text-align:center;font-size:10px">';
      html += '<div>'+d.rate+'%</div>';
      html += '<div style="height:'+h+'px;background:'+c+';border-radius:3px 3px 0 0;margin:2px 0"></div>';
      html += '<div style="color:var(--sub)">'+(d.date||'').slice(5)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('statsContent').innerHTML = html;
}

// === 菜单切换 ===
function toggleMenu(){
  var panel = document.getElementById('menuPanel');
  var btn = document.getElementById('plusBtn');
  if(panel.style.display==='none'){
    panel.style.display='block';
    btn.textContent='✕';
  }else{
    panel.style.display='none';
    btn.textContent='＋';
  }
}
// 发送消息后自动关闭菜单
var _origSend = send;
send = function(msg){
  document.getElementById('menuPanel').style.display='none';
  document.getElementById('plusBtn').textContent='＋';
  return _origSend(msg);
};

// === WebSocket ===
// 本地用 8765 端口，云端用 /ws 代理
var WS_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'ws://' + location.hostname + ':8765/?token=schedule123'
  : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws?token=schedule123';
var ws,chatId,streamBuf='',streamEl=null;

function formatText(t){
  if(!t)return'';
  // 把 markdown 表格转为列表（逐行处理，更稳健）
  var lines=t.split('\n');
  var out=[];
  var header=null;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    var trimmed=ln.trim();
    // 是表格行（以 | 开头结尾）
    if(/^\|.*\|$/.test(trimmed)){
      // 分隔行 |---|---| 直接跳过
      if(/^\|[\s:|-]+\|$/.test(trimmed)){continue;}
      var cells=trimmed.slice(1,-1).split('|').map(function(c){return c.trim()});
      // 第一行作为表头，跳过不显示
      if(header===null){header=cells;continue;}
      // 数据行：用空格拼接非空单元格
      var parts=cells.filter(function(c){return c});
      out.push(parts.join('　'));
    }else{
      header=null;  // 表格结束，重置
      out.push(ln);
    }
  }
  t=out.join('\n');
  // 日程行自动加图标和加粗时间
  t=t.replace(/(\d+)[\.\s、]+\s*(\S[^—\-\n]+?)\s*[—\-]\s*(\d{1,2}:\d{2}[^\n]*)/g,function(_,n,title,time){
    var icon='📝';
    if(/跑|运动|健身|锻炼|游泳/.test(title))icon='🏃';
    else if(/会|议|汇报|讨论|评审|面试/.test(title))icon='💼';
    else if(/课|学|习|读|写|考/.test(title))icon='📚';
    else if(/饭|餐|吃|喝|聚/.test(title))icon='🍽️';
    else if(/玩|游|唱|演|影|剧|展/.test(title))icon='🎉';
    return icon+' <b>'+time.trim()+'</b> '+title.trim();
  });
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\n/g,'<br>');
}

function addChat(text,side){
  var row=document.createElement('div');
  row.className='msg-row '+(side||'other');
  var avatar=document.createElement('div');
  avatar.className='msg-avatar '+(side==='self'?'user':'bot');
  avatar.textContent=side==='self'?'😊':'🤖';
  var content=document.createElement('div');
  content.className='msg-content';
  var bubble=document.createElement('div');
  bubble.className='msg-bubble';
  bubble.innerHTML=side==='tool'?text:formatText(text);
  var time=document.createElement('div');
  time.className='msg-time';
  var now=new Date();
  time.textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  content.appendChild(bubble);
  content.appendChild(time);
  row.appendChild(avatar);
  row.appendChild(content);
  document.getElementById('chat').appendChild(row);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
  return bubble;
}

function addTool(text){
  var div=document.createElement('div');
  div.className='tool-msg';
  div.textContent=text;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

function connect(){
  ws=new WebSocket(WS_URL);
  var heartbeat,reconnectDelay=3000;
  ws.onopen=function(){
    document.getElementById('statusText').textContent='在线';
    document.getElementById('statusText').style.color='';
    ws.send(JSON.stringify({type:'new_chat'}));
    heartbeat=setInterval(function(){
      if(ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'ping'}));
    },30000);
    reconnectDelay=3000;
  };
  ws.onmessage=function(e){
    var d=JSON.parse(e.data),ev=d.event||'';
    if(ev==='attached'){chatId=d.chat_id;return}
    if(ev==='pong'){return}
    if(ev==='delta'){
      streamBuf+=(d.text||'');
      if(!streamEl) streamEl=addChat('','other');
      streamEl.innerHTML=formatText(streamBuf);
      return;
    }
    if(ev==='stream_end'){streamEl=null;streamBuf='';return}
    if(ev==='message'){
      if(streamEl){streamEl=null;streamBuf=''}
      var txt=d.text||'';
      if(txt.trim()) addChat(txt,'other');
      return;
    }
    if(ev==='tool_hint'||ev==='tool_start'){addTool((d.name||'')+(d.args||''));return}
  };
  ws.onclose=function(){
    chatId=null;streamBuf='';streamEl=null;
    if(heartbeat){clearInterval(heartbeat);heartbeat=null;}
    document.getElementById('statusText').textContent='离线('+(reconnectDelay/1000)+'s后重连)';
    document.getElementById('statusText').style.color='#ef4444';
    setTimeout(connect,reconnectDelay);
    reconnectDelay=Math.min(reconnectDelay*1.5,30000);
  };
}

function send(msg){
  var input=document.getElementById('input');
  var text=msg||input.value.trim();
  if(!text||!chatId)return;
  addChat(text,'self');
  streamBuf='';streamEl=null;
  ws.send(JSON.stringify({type:'message',chat_id:chatId,content:text}));
  input.value='';input.focus();
  fetch('/api/user-active',{method:'POST'});
}
document.getElementById('input').addEventListener('keydown',function(e){if(e.key==='Enter')send()});

// === 通知 ===
document.addEventListener('click',function(){
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
});

var pollTimer=null,shownIds={};
function adaptivePoll(){
  fetch('/api/notifications').then(function(r){return r.json()}).then(function(data){
    (data.notifications||[]).forEach(function(rem){
      if(shownIds[rem.kind+rem.message])return;
      shownIds[rem.kind+rem.message]=true;
      addChat(rem.message,'other');
      var bar=document.getElementById('alertBar');
      bar.style.display='block';bar.textContent=rem.message;
      clearTimeout(bar._t);bar._t=setTimeout(function(){bar.style.display='none'},4000);
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('日程助手',{body:rem.message,icon:'📅'});
      }
    });
  }).finally(function(){
    fetch('/api/poll-interval').then(function(r){return r.json()}).then(function(cfg){
      clearTimeout(pollTimer);pollTimer=setTimeout(adaptivePoll,cfg.interval_ms||5000);
    });
  });
}
adaptivePoll();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
connect();
</script>
